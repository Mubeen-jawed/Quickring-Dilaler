# Nginx reverse proxy for QuickRing
# Domain: dialer.revenuelyft.com  ->  Node/Express on 127.0.0.1:3002
#
# Installed to /etc/nginx/sites-available/dialer.revenuelyft.com by deploy.sh.
# Certbot (--nginx) rewrites this to add the TLS (443) server block and an
# HTTP->HTTPS redirect, so you normally do not edit the 443 part by hand.

server {
    listen 80;
    listen [::]:80;
    server_name dialer.revenuelyft.com;

    # Allow large request bodies (e.g. Twilio webhooks / future uploads)
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        # WebSocket support for Socket.IO (/socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client info through to the app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts so idle WebSocket connections are not dropped
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }
}
